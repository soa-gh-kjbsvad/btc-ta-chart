  <button onclick="resetZoom()">Reset Zoom</button>

  <div id="loading">Loading market data...</div>

</div>
<div class="src">Data: CoinGecko (live 1Y) + historical estimates · Log regression on full dataset</div>

function fmt(n) {
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  return '$' + (n/1e6).toFixed(0) + 'M';
}

function logRegression(data) {
  var n = data.length;
  var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
  var t0 = data[0][0];
  for (var i = 0; i < n; i++) {
    var x = Math.log((data[i][0] - t0) / 86400000 + 1);
    var y = Math.log(data[i][1]);
    sumX += x; sumY += y; sumXY += x * y; sumX2 += x * x;
  }
  var b = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  var a = (sumY - b * sumX) / n;
  return { a: a, b: b, t0: t0 };
}

function fairValue(reg, timestamp) {
  var x = Math.log((timestamp - reg.t0) / 86400000 + 1);
  return Math.exp(reg.a + reg.b * x);
}

function mergeData(historical, live) {
  // live data takes priority for overlapping dates
  var merged = [];
  var liveStart = live.length > 0 ? live[0][0] : Infinity;
  for (var i = 0; i < historical.length; i++) {
    if (historical[i][0] < liveStart - 86400000 * 15) {
      merged.push(historical[i]);
    }
  }
  for (var j = 0; j < live.length; j++) {
    merged.push(live[j]);
  }
  merged.sort(function(a, b) { return a[0] - b[0]; });
  return merged;
}

function buildChart(data, days) {
  var filtered = days > 0 ? data.filter(function(d) { return d[0] >= Date.now() - days * 86400000; }) : data;
  var reg = logRegression(data);

  var labels = [];
  var mcap = [];
  var fv = [];
  var upper = [];
  var lower = [];

  for (var i = 0; i < filtered.length; i++) {
    var t = filtered[i][0];
    var v = filtered[i][1];
    var fair = fairValue(reg, t);
    labels.push(new Date(t));
    mcap.push(v);
    fv.push(fair);
    upper.push(fair * 3.5);
    lower.push(fair * 0.35);
  }

  var latest = mcap[mcap.length - 1];
  var latestFV = fv[fv.length - 1];
  var deviation = ((latest / latestFV) - 1) * 100;
  var devClass = deviation > 30 ? 'over' : deviation < -30 ? 'under' : 'neutral';
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="label">Market Cap</div><div class="val">' + fmt(latest) + '</div></div>' +
    '<div class="stat"><div class="label">Fair Value</div><div class="val" style="color:#ffa502">' + fmt(latestFV) + '</div></div>' +
    '<div class="stat"><div class="label">Deviation</div><div class="val ' + devClass + '">' + (deviation > 0 ? '+' : '') + deviation.toFixed(0) + '%</div></div>';

  var ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Overvalued Zone',
          data: upper,
          borderColor: 'transparent',
          backgroundColor: 'rgba(255,71,87,0.08)',
          fill: '+1',
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: 'Fair Value',
          data: fv,
          borderColor: '#ffa502',
          borderWidth: 2,
          borderDash: [6, 3],
          pointRadius: 0,
          fill: false,
          tension: 0.3
        },
        {
          label: 'Undervalued Zone',
          data: lower,
          borderColor: 'transparent',
          backgroundColor: 'rgba(46,213,115,0.08)',
          fill: '-1',
          pointRadius: 0,
          tension: 0.3
        },
        {
          label: 'Market Cap',
          data: mcap,
          borderColor: '#00d2ff',
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          tension: 0.1,
          order: -1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'MMM d, yyyy' },
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#666', maxTicksLimit: 8, font: { size: 10 } }
        },
        y: {
          type: 'logarithmic',
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#666',
            font: { size: 10 },
            callback: function(v) { return fmt(v); }
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a2e',
          titleColor: '#fff',
          bodyColor: '#ccc',
          borderColor: '#333',
          borderWidth: 1,
          callbacks: {
            label: function(ctx) {
              if (ctx.datasetIndex === 0 || ctx.datasetIndex === 2) return null;
              return ctx.dataset.label + ': ' + fmt(ctx.parsed.y);
            }
          }
        },
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'x'
          }
        }
      }
    }
  });
}

function setRange(days) {
  currentRange = days;
  var btns = document.querySelectorAll('.controls button');
  for (var i = 0; i < btns.length - 1; i++) btns[i].className = '';
  if (event && event.target && event.target.textContent !== 'Reset Zoom') event.target.className = 'active';
  if (rawData) buildChart(rawData, days);
}

function resetZoom() { if (chart) chart.resetZoom(); }

// Try to fetch live data from CoinGecko (last 365 days), merge with historical
// Use BTC market cap * dominance factor as proxy for total market cap
function init() {
  fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=365&interval=daily')
  .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(json) {
    // BTC is ~55% dominance, scale to total
    var live = json.market_caps.map(function(d) { return [d[0], d[1] / 0.55]; });
    rawData = mergeData(historicalData, live);
    document.getElementById('loading').style.display = 'none';
    buildChart(rawData, currentRange);
  })
  .catch(function() {
    // Fallback to historical only + current from coinpaprika
    fetch('https://api.coinpaprika.com/v1/global')
    .then(function(r) { return r.json(); })
    .then(function(g) {
      var now = [Date.now(), g.market_cap_usd];
      historicalData.push(now);
      rawData = historicalData;
      document.getElementById('loading').style.display = 'none';
      buildChart(rawData, currentRange);
    })
    .catch(function() {
      rawData = historicalData;
      document.getElementById('loading').style.display = 'none';
      buildChart(rawData, currentRange);
    });
  });
}

init();
</script>
